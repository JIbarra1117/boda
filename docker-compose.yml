version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: boda_db
    restart: always
    environment:
      POSTGRES_USER: boda_user
      POSTGRES_PASSWORD: boda_password
      POSTGRES_DB: boda_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boda_user -d boda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: boda_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://boda_user:boda_password@db:5432/boda_db?schema=public
      NODE_ENV: development
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npx prisma generate && npm run start:dev"

  frontend:
    build: ./frontend
    container_name: boda_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.100.175:3000
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    depends_on:
      - backend

volumes:
  postgres_data:
